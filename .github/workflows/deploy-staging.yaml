name: Deploy Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://judkinsparkforpeople.org/staging/
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: app

      - name: Build SPA (staging)
        run: npm run build -- --base=/staging/ --outDir ../dist-staging/
        working-directory: app
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      # Check if staging was last deployed by a different PR
      - name: Check for staging overwrite
        id: overwrite
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const marker = '<!-- staging-deploy-bot -->'
            const currentPR = context.issue.number

            // Search open PRs for an existing staging comment from a different PR
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            })

            for (const pr of pulls.data) {
              if (pr.number === currentPR) continue
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              })
              const staging = comments.data.find(c => c.body.includes(marker) && !c.body.includes('⚠️ Staging was overwritten'))
              if (staging) {
                // Mark the old PR's staging comment as overwritten
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: staging.id,
                  body: `${marker}\n⚠️ Staging was overwritten by PR #${currentPR}`,
                })
                return String(pr.number)
              }
            }
            return ''

      - name: Deploy to GitHub Pages (staging)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-staging
          destination_dir: staging
          publish_branch: gh-pages
          keep_files: true

      # Take a screenshot of the deployed staging site
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --wait-for-timeout=5000 \
            --viewport-size="1280,800" \
            "https://judkinsparkforpeople.org/staging/" \
            staging-screenshot.png

      - name: Upload screenshot
        id: screenshot
        uses: actions/upload-artifact@v4
        with:
          name: staging-screenshot
          path: staging-screenshot.png

      - name: Post staging comment on PR
        uses: actions/github-script@v8
        env:
          OVERWRITTEN_PR: ${{ steps.overwrite.outputs.result }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- staging-deploy-bot -->'
            const prNumber = context.issue.number
            const url = 'https://judkinsparkforpeople.org/staging/'
            const runId = process.env.RUN_ID
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts`
            const overwrittenPR = process.env.OVERWRITTEN_PR

            let body = `${marker}\n`
            if (overwrittenPR) {
              body += `> ⚠️ This deploy overwrote staging from PR #${overwrittenPR}\n\n`
            }
            body += `**Staging deployed:** ${url}\n\n`
            body += `📸 [Screenshot artifact](${artifactUrl})`

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c => c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
