name: Cleanup Branch Preview

on:
  delete:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Compute slug
        id: slug
        run: |
          # On 'delete' event the branch name is in github.event.ref
          # On 'pull_request closed' it is in github.head_ref
          if [ "${{ github.event_name }}" = "delete" ]; then
            raw="${{ github.event.ref }}"
            ref_type="${{ github.event.ref_type }}"
            if [ "$ref_type" != "branch" ]; then
              echo "Not a branch deletion — skipping"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            raw="${{ github.head_ref }}"
          fi
          slug=$(echo "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's|[^a-z0-9]|-|g' \
            | sed 's|-\+|-|g' \
            | sed 's|^-||;s|-$||' \
            | cut -c1-50)
          echo "slug=$slug" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout gh-pages
        if: steps.slug.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview directory and push
        if: steps.slug.outputs.skip != 'true'
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          if [ -d "preview/$SLUG" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "preview/$SLUG"
            git commit -m "cleanup: remove preview/$SLUG"
            git push origin gh-pages
          else
            echo "preview/$SLUG not found — nothing to clean up"
          fi
